name: Android Product Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  product-gate:
    name: Compile, test, lint, release R8
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run seaFOX product gate
        run: ./scripts/seafox-product-check.sh --ci --release-r8

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-debug-report
          path: app/build/reports/lint-results-debug.*
          if-no-files-found: ignore

      - name: Upload release shrinker reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-r8-reports
          path: |
            app/build/outputs/mapping/release/**
          if-no-files-found: ignore
